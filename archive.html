<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章都在这里</title>
    <link rel="icon" href="pic1.png" type="image/png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="articles.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            background: transparent;
        }
        
        body {
            min-height: 100vh;
            background: #000;
            overflow-x: hidden;
            font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
            scroll-behavior: smooth;
            padding-top: 80px;
            display: flex;
            flex-direction: column;
        }
        
        .main-content {
            flex: 1;
        }
        
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease-out, transform 1s ease-out; /* 星空入场动画 */
        }

        #main-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 999;
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 15px 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(0);
            transition: opacity 0.8s ease-out 0.2s, transform 0.3s ease; /* 导航延迟入场 */
        }

        #main-nav a {
            color: #d87999;
            font-size: 18px;
            text-decoration: none;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #main-nav a img {
            width: 18px;
            height: 18px;
            object-fit: contain;
            filter: brightness(0) saturate(100%) invert(43%) sepia(14%) saturate(1849%) hue-rotate(325deg) brightness(95%) contrast(91%);
            transition: filter 0.3s ease;
        }

        #main-nav a:hover img {
            filter: brightness(0) saturate(100%) invert(70%) sepia(8%) saturate(537%) hue-rotate(314deg) brightness(100%) contrast(85%);
        }

        #main-nav a:hover {
            color: #ae8d8d;
        }
        
        /* 汉堡菜单按钮 */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            border: none;
            color: #d87999;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
        }

        /* 归档内容入场动画：延迟+渐入+上移 */
        .archive-section {
            position: relative;
            width: 100%;
            padding: 80px 20px;
            z-index: 5;
            color: #fff;
            font-family: "SimSun", "宋体", serif !important;
            opacity: 0; /* 初始透明 */
            transform: translateY(20px); /* 初始下移 */
            transition: opacity 0.8s ease-out 0.5s, transform 0.8s ease-out 0.5s; /* 延迟0.5s入场 */
        }

        .archive-title {
            font-size: 60px;
            color: #d87999;
            margin: 0 auto 50px;
            max-width: 800px;
            text-align: left;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(216, 121, 153, 0.3);
        }

        .archive-list {
            max-width: 800px;
            margin: 0 auto;
        }

        .archive-item {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }

        .archive-date {
            font-size: 16px;
            color: #d87999;
            margin-bottom: 10px;
        }

        .archive-post-title {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .archive-post-title a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .archive-post-title a:hover {
            color: #d87999;
        }

        .archive-desc {
            font-size: 18px;
            color: #ccc;
            line-height: 1.6;
            margin-top: 8px;
        }

        .read-info {
            color: #aaa;
            font-size: 14px;
            margin-top: 8px;
            font-family: "SimSun", "宋体", serif;
        }

        .pagination {
            max-width: 800px;
            margin: 40px auto 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pagination-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .pagination-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .pagination-btn.active {
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            font-weight: bold;
            cursor: default;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: rgba(255,255,255,0.02);
            color: #888;
        }

        @media (max-width:768px){
            /* 导航栏适配 */
            .menu-toggle {
                display: block;
            }
            
            #main-nav {
                position: fixed;
                top: 0;
                right: -100%;
                width: 250px;
                height: 100vh;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 30px;
                background: rgba(0,0,0,0.95);
                transition: right 0.3s ease;
            }
            
            #main-nav.active {
                right: 0;
            }
            
            /* 归档内容适配 */
            .archive-title {font-size: 32px;}
            .archive-post-title {font-size: 20px;}
            .archive-desc {font-size: 16px;}
            .archive-date {font-size: 14px;}
            .pagination {gap: 5px;}
            .pagination-btn {padding: 6px 12px; font-size: 13px;}
        }

        footer {
            position: relative;
            width: 100%;
            padding: 40px 20px 20px;
            margin-top: 80px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: #ccc;
            text-align: center;
            z-index: 5;
            opacity: 1 !important;
            transform: translateY(0) !important;
            transition: opacity 0.8s ease-out 0.8s, transform 0.8s ease-out 0.8s; /* 版权最后入场 */
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            font-size: 14px;
            line-height: 1.8;
        }
        .copyright {
            margin-bottom: 8px;
        }
        .power-by {
            color: #d87999;
            margin-bottom: 12px;
        }
        .footer-link {
            color: #d87999 !important;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .footer-link:hover {
            color: #fff !important;
        }
        .beian-info {
            font-size: 12px;
            color: #888;
        }

        /* 回到顶部按钮 */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(216, 121, 153, 0.8);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateY(20px);
            z-index: 999;
        }

        .back-to-top.show {
            opacity: 1;
            transform: translateY(0);
        }

        .back-to-top:hover {
            background: rgba(216, 121, 153, 1);
        }

        @media (max-width:768px) {
            footer {
                padding: 30px 15px 15px;
            }
            .footer-content {
                font-size: 13px;
            }
            .back-to-top {
                width: 40px;
                height: 40px;
                bottom: 20px;
                right: 20px;
            }
            .beian-info {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <canvas id="stars"></canvas>
    
    <!-- 汉堡菜单按钮 -->
    <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
    </button>
    
    <nav id="main-nav">
        <a href="index.html"><img src="icons/home.png" alt="">首页</a>
        <a href="archive.html"><img src="icons/archive.png" alt="">归档</a>
        <a href="note.html"><img src="icons/note.png" alt="">手记</a>
        <a href="link.html"><img src="icons/link.png" alt="">友链</a>
        <a href="#" onclick="randomJump(); return false;"><img src="icons/jump.png" alt="">跃迁</a>
    </nav>

    <div class="main-content">
        <section class="archive-section">
            <h1 class="archive-title">归档</h1>
            <div class="archive-list" id="archive-list"></div>
            <div class="pagination" id="pagination">
                <button class="pagination-btn" id="first-page-btn">首页</button>
                <button class="pagination-btn" id="prev-btn">上一页</button>
                <div class="page-numbers" id="page-numbers"></div>
                <button class="pagination-btn" id="next-btn">下一页</button>
                <button class="pagination-btn" id="last-page-btn">尾页</button>
            </div>
        </section>

        <!-- 回到顶部按钮 -->
        <div class="back-to-top" id="backToTop">↑</div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="copyright">Copyright © 2026 Conny's Blog. All Rights Reserved.</div>
            <div class="power-by">Power by <a href="#" class="footer-link">Conny Jabrado</a> | Designed with Chuangjie Yang</div>
            <div class="beian-info">萌ICP备20240924号 | 网站安全检测 ✔</div>
        </div>
    </footer>

<script>
    let isAnimateComplete = false;
    let lastScrollPosition = 0;
    let lastScrollY = 0;
    const menu = document.getElementById('main-nav');

    window.history.scrollRestoration = "manual";
    window.scrollTo(0, 0);

    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    class Star {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 0.8 + 0.5;
            this.alpha = Math.random() * 0.1 + 0.9;
            this.moveX = (Math.random() - 0.5) * 0.4;
            this.moveY = (Math.random() - 0.5) * 0.4;
        }
        update() {
            this.x += this.moveX;
            this.y += this.moveY;
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 220, 230, ${this.alpha})`;
            ctx.fill();
        }
    }

    const stars = Array.from({length:300},()=>new Star());
    function animateStars() {
        ctx.fillStyle = 'rgba(0,0,0,1)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        stars.forEach(s=>{s.update();s.draw();});
        requestAnimationFrame(animateStars);
    }
    animateStars();

    // 入场动画触发逻辑（和主页完全一致）
    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            document.body.classList.add('animate-complete');
            isAnimateComplete = true;
            
            // 1. 星空先入场（1s动画）
            document.getElementById('stars').style.opacity = 1;
            document.getElementById('stars').style.transform = 'translateY(0)';
            
            // 2. 导航延迟0.2s入场（0.8s动画）
            document.getElementById('main-nav').style.opacity = 1;
            
            // 3. 归档内容延迟0.5s入场（0.8s动画：上移+渐入）
            document.querySelector('.archive-section').style.opacity = 1;
            document.querySelector('.archive-section').style.transform = 'translateY(0)';
            
            // 4. 底部版权延迟0.8s入场
            document.querySelector('footer').style.opacity = 1;
            document.querySelector('footer').style.transform = 'translateY(0)';
        }, 100);
        initAdvancedPagination();
    });

    function randomJump() {
        const urls = [
            'https://www.google.com',
            'https://github.com',
            'https://stackoverflow.com',
            'https://www.wikipedia.org',
            'https://www.reddit.com',
            'https://news.ycombinator.com',
            'https://www.youtube.com',
            'https://www.netflix.com',
            'https://www.spotify.com',
            'https://www.medium.com'
        ];
        const randomUrl = urls[Math.floor(Math.random() * urls.length)];
        window.open(randomUrl, '_blank');
    }

    // 汉堡菜单功能
    const menuToggle = document.getElementById('menuToggle');
    const nav = document.getElementById('main-nav');
    
    menuToggle.addEventListener('click', function() {
        nav.classList.toggle('active');
        // 切换菜单图标
        const icon = menuToggle.querySelector('i');
        if (nav.classList.contains('active')) {
            icon.classList.remove('fa-bars');
            icon.classList.add('fa-times');
        } else {
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
        }
    });

    // 点击导航链接后关闭菜单
    const navLinks = nav.querySelectorAll('a');
    navLinks.forEach(link => {
        link.addEventListener('click', function() {
            nav.classList.remove('active');
            const icon = menuToggle.querySelector('i');
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
        });
    });

    window.addEventListener('scroll', function() {
        const currentScrollY = window.scrollY;
        if (currentScrollY > lastScrollY && currentScrollY > 100) {
            nav.style.transform = 'translateY(-100%)';
        } else {
            nav.style.transform = 'translateY(0)';
        }
        lastScrollY = currentScrollY;
    });

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    // 使用articles.js中的数据，只显示tech分类的文章
    const archiveData = articles.filter(article => article.category === 'tech');

    const PAGE_SIZE = 10;
    let currentPage = 1;
    const totalPages = Math.ceil(archiveData.length / PAGE_SIZE);
    const SHOW_PAGE_NUM = 5;

    function initAdvancedPagination() {
        renderArchiveList(currentPage);
        renderPageNumbers(currentPage);
        updatePaginationStatus();

        document.getElementById('first-page-btn').onclick = () => {
            currentPage = 1;
            renderArchiveList(currentPage); renderPageNumbers(currentPage); updatePaginationStatus();
        }
        document.getElementById('prev-btn').onclick = () => {
            if(currentPage>1){currentPage--;
            renderArchiveList(currentPage); renderPageNumbers(currentPage); updatePaginationStatus();}
        }
        document.getElementById('next-btn').onclick = () => {
            if(currentPage<totalPages){currentPage++;
            renderArchiveList(currentPage); renderPageNumbers(currentPage); updatePaginationStatus();}
        }
        document.getElementById('last-page-btn').onclick = () => {
            currentPage = totalPages;
            renderArchiveList(currentPage); renderPageNumbers(currentPage); updatePaginationStatus();
        }
    }

    // 渲染文章（带字数 + 阅读时间）
    function renderArchiveList(page) {
        const listContainer = document.getElementById('archive-list');
        listContainer.innerHTML = '';
        const start = (page-1)*PAGE_SIZE;
        const end = Math.min(start+PAGE_SIZE, archiveData.length);
        const data = archiveData.slice(start, end);

        data.forEach(item => {
            const maxLen = 30;
            const shortDesc = item.desc.length > maxLen ? item.desc.substring(0,maxLen)+'...' : item.desc;
            const wordCount = item.desc.length;
            const readTime = Math.max(1, Math.ceil(wordCount / 300));

            listContainer.innerHTML += `
            <div class="archive-item">
                <div class="archive-date">${item.date}</div>
                <h2 class="archive-post-title"><a href="article.html?id=${item.id}">${item.title}</a></h2>
                <p class="archive-desc">${shortDesc}</p>
                <div class="read-info">共${wordCount}字，预计阅读时长 ${readTime} 分钟</div>
            </div>`;
        });
    }

    function renderPageNumbers(currentPage) {
        const box = document.getElementById('page-numbers');
        box.innerHTML = '';
        let start = Math.max(1, currentPage - 2);
        let end = start + 4;
        if(end > totalPages) { end = totalPages; start = Math.max(1, end-4); }
        for(let i=start; i<=end; i++) {
            const btn = document.createElement('button');
            btn.className = `pagination-btn ${i===currentPage ? 'active' : ''}`;
            btn.textContent = i;
            btn.onclick = () => {
                currentPage = i;
                renderArchiveList(i);
                renderPageNumbers(i);
                updatePaginationStatus();
            };
            box.appendChild(btn);
        }
    }

    function updatePaginationStatus() {
        document.getElementById('first-page-btn').disabled = currentPage===1;
        document.getElementById('prev-btn').disabled = currentPage===1;
        document.getElementById('next-btn').disabled = currentPage===totalPages;
        document.getElementById('last-page-btn').disabled = currentPage===totalPages;
    }

    // 回到顶部功能
    const backToTopBtn = document.getElementById('backToTop');

    window.addEventListener('scroll', function() {
        if (window.pageYOffset > 300) {
            backToTopBtn.classList.add('show');
        } else {
            backToTopBtn.classList.remove('show');
        }
    });

    backToTopBtn.addEventListener('click', function() {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    });
</script>
</body>
</html>
