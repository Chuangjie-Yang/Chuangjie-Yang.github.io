<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情</title>
    <link rel="icon" href="pic1.png" type="image/png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="articles.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            background: transparent;
        }
        
        body {
            min-height: 100vh;
            background: #000;
            overflow-x: hidden;
            font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
            scroll-behavior: smooth;
            padding-top: 80px;
            display: flex;
            flex-direction: column;
        }
        
        .main-content {
            flex: 1;
        }
        
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease-out, transform 1s ease-out;
        }

        #main-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 999;
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 15px 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(0);
            transition: opacity 0.8s ease-out 0.2s, transform 0.3s ease;
        }

        #main-nav a {
            color: #d87999;
            font-size: 18px;
            text-decoration: none;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #main-nav a img {
            width: 18px;
            height: 18px;
            object-fit: contain;
            filter: brightness(0) saturate(100%) invert(43%) sepia(14%) saturate(1849%) hue-rotate(325deg) brightness(95%) contrast(91%);
        }

        #main-nav a:hover img {
            filter: brightness(0) saturate(100%) invert(70%) sepia(8%) saturate(537%) hue-rotate(314deg) brightness(100%) contrast(85%);
        }

        #main-nav a:hover {
            color: #ae8d8d;
        }
        
        /* 汉堡菜单按钮 */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            border: none;
            color: #d87999;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
        }

        /* 文章内容入场动画：延迟+渐入+上移 */
        .article-section {
            position: relative;
            width: 100%;
            padding: 80px 20px;
            z-index: 5;
            color: #fff;
            font-family: "SimSun", "宋体", serif !important;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out 0.5s, transform 0.8s ease-out 0.5s;
        }

        .article-title {
            font-size: 60px;
            color: #fff;
            margin: 0 auto 50px;
            max-width: 800px;
            text-align: left;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        }

        /* 文章内容样式 */
        .article-content {
            max-width: 800px;
            margin: 0 auto 40px;
            background: rgba(255,255,255,0.03);
            padding: 40px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        .article-content h1, .article-content h2, .article-content h3, .article-content h4, .article-content h5, .article-content h6 {
            color: #fff;
            margin: 20px 0 10px;
        }

        .article-content p {
            color: #ccc;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .article-content a {
            color: #fff;
            text-decoration: none;
        }

        .article-content a:hover {
            text-decoration: underline;
        }

        .article-content ul, .article-content ol {
            color: #ccc;
            margin: 15px 0;
            padding-left: 30px;
        }

        .article-content li {
            margin-bottom: 8px;
        }

        .article-content blockquote {
            border-left: 3px solid #fff;
            padding-left: 20px;
            margin: 15px 0;
            color: #aaa;
        }

        .article-content code {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
        }

        .article-content pre {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 15px 0;
        }

        .article-content pre code {
            background: none;
            padding: 0;
        }

        /* 代码语法高亮 */
        .article-content pre code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
        }

        /* 关键字 */
        .article-content pre code .keyword {
            color: #ff79c6;
        }

        /* 字符串 */
        .article-content pre code .string {
            color: #f1fa8c;
        }

        /* 注释 */
        .article-content pre code .comment {
            color: #6272a4;
        }

        /* 数字 */
        .article-content pre code .number {
            color: #bd93f9;
        }

        /* 函数名 */
        .article-content pre code .function {
            color: #50fa7b;
        }

        /* 变量 */
        .article-content pre code .variable {
            color: #8be9fd;
        }

        .article-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 15px 0;
        }

        .article-meta {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(216, 121, 153, 0.2);
        }

        .back-link {
            display: inline-block;
            margin: 20px 0;
            color: #d87999;
            text-decoration: none;
            font-size: 16px;
        }

        .back-link:hover {
            color: #ae8d8d;
        }

        footer {
            position: relative;
            width: 100%;
            padding: 40px 20px 20px;
            margin-top: 80px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: #ccc;
            text-align: center;
            z-index: 5;
            opacity: 1 !important;
            transform: translateY(0) !important;
            transition: opacity 0.8s ease-out 0.8s, transform 0.8s ease-out 0.8s;
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            font-size: 14px;
            line-height: 1.8;
        }
        .copyright {
            margin-bottom: 8px;
        }
        .power-by {
            color: #d87999;
            margin-bottom: 12px;
        }
        .footer-link {
            color: #d87999 !important;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .footer-link:hover {
            color: #fff !important;
        }
        .beian-info {
            font-size: 12px;
            color: #888;
        }

        /* 回到顶部按钮 */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(216, 121, 153, 0.8);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateY(20px);
            z-index: 999;
        }

        .back-to-top.show {
            opacity: 1;
            transform: translateY(0);
        }

        .back-to-top:hover {
            background: rgba(216, 121, 153, 1);
        }

        @media (max-width:768px){
            /* 导航栏适配 */
            .menu-toggle {
                display: block;
            }
            
            #main-nav {
                position: fixed;
                top: 0;
                right: -100%;
                width: 250px;
                height: 100vh;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 30px;
                background: rgba(0,0,0,0.95);
                transition: right 0.3s ease;
            }
            
            #main-nav.active {
                right: 0;
            }
            
            /* 文章内容适配 */
            .article-title {font-size: 32px;}
            .article-content {padding: 20px;}
            
            footer {
                padding: 30px 15px 15px;
            }
            .footer-content {
                font-size: 13px;
            }
            .beian-info {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <canvas id="stars"></canvas>
    
    <!-- 汉堡菜单按钮 -->
    <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
    </button>
    
    <nav id="main-nav">
        <a href="index.html"><img src="icons/home.png" alt="">首页</a>
        <a href="archive.html"><img src="icons/archive.png" alt="">归档</a>
        <a href="note.html"><img src="icons/note.png" alt="">手记</a>
        <a href="link.html"><img src="icons/link.png" alt="">友链</a>
        <a href="#" onclick="randomJump(); return false;"><img src="icons/jump.png" alt="">跃迁</a>
    </nav>

    <div class="main-content">
        <section class="article-section">
            <h1 class="article-title">文章详情</h1>
            <div id="article-content" class="article-content"></div>
        </section>

        <!-- 回到顶部按钮 -->
        <div class="back-to-top" id="backToTop">↑</div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="copyright">Copyright © 2026 Conny's Blog. All Rights Reserved.</div>
            <div class="power-by">Power by <a href="#" class="footer-link">Conny Jabrado</a> | Designed with Chuangjie Yang</div>
            <div class="beian-info">萌ICP备20240924号 | 网站安全检测 ✔</div>
        </div>
    </footer>

<script>
    let isAnimateComplete = false;
    let lastScrollPosition = 0;
    let lastScrollY = 0;
    const menu = document.getElementById('main-nav');

    window.history.scrollRestoration = "manual";
    window.scrollTo(0, 0);

    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    class Star {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 0.8 + 0.5;
            this.alpha = Math.random() * 0.1 + 0.9;
            this.moveX = (Math.random() - 0.5) * 0.4;
            this.moveY = (Math.random() - 0.5) * 0.4;
        }
        update() {
            this.x += this.moveX;
            this.y += this.moveY;
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 220, 230, ${this.alpha})`;
            ctx.fill();
        }
    }

    const stars = Array.from({length:300},()=>new Star());
    function animateStars() {
        ctx.fillStyle = 'rgba(0,0,0,1)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        stars.forEach(s=>{s.update();s.draw();});
        requestAnimationFrame(animateStars);
    }
    animateStars();

    // 入场动画触发逻辑
    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            document.body.classList.add('animate-complete');
            isAnimateComplete = true;
            
            // 1. 星空先入场（1s动画）
            document.getElementById('stars').style.opacity = 1;
            document.getElementById('stars').style.transform = 'translateY(0)';
            
            // 2. 导航延迟0.2s入场（0.8s动画）
            document.getElementById('main-nav').style.opacity = 1;
            
            // 3. 文章内容延迟0.5s入场（0.8s动画：上移+渐入）
            document.querySelector('.article-section').style.opacity = 1;
            document.querySelector('.article-section').style.transform = 'translateY(0)';
            
            // 4. 底部版权延迟0.8s入场
            document.querySelector('footer').style.opacity = 1;
            document.querySelector('footer').style.transform = 'translateY(0)';
        }, 100);
        
        // 加载文章内容
        loadArticle();
    });

    // 代码语法高亮
    function highlightCode() {
        const codeBlocks = document.querySelectorAll('.article-content pre code');
        codeBlocks.forEach(codeBlock => {
            let code = codeBlock.textContent;
            
            // 高亮关键字
            code = code.replace(/\b(function|const|let|var|if|else|for|while|return|console|log|true|false|null|undefined)\b/g, '<span class="keyword">$1</span>');
            
            // 高亮字符串
            code = code.replace(/('([^'\\]|\\.)*')|("([^"\\]|\\.)*")/g, '<span class="string">$1$3</span>');
            
            // 高亮注释
            code = code.replace(/\/\/.*$/gm, '<span class="comment">$&</span>');
            code = code.replace(/\/\*[\s\S]*?\*\//g, '<span class="comment">$&</span>');
            
            // 高亮数字
            code = code.replace(/\b\d+\b/g, '<span class="number">$&</span>');
            
            // 高亮函数名
            code = code.replace(/\bfunction\s+([a-zA-Z_$][a-zA-Z0-9_$]*)\s*\(/g, 'function <span class="function">$1</span>(');
            
            // 高亮变量名
            code = code.replace(/\b([a-zA-Z_$][a-zA-Z0-9_$]*)\s*=/g, '<span class="variable">$1</span> =');
            
            codeBlock.innerHTML = code;
        });
    }

    // 加载文章
    function loadArticle() {
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = parseInt(urlParams.get('id'));
        
        const article = articles.find(a => a.id === articleId);
        
        if (article) {
            // 将markdown转换为HTML
            const html = marked.parse(article.content);
            
            // 更新页面标题
            document.title = `${article.title} - 动态星空博客`;
            document.querySelector('.article-title').textContent = article.title;
            
            // 显示文章内容
            const articleContent = document.getElementById('article-content');
            articleContent.innerHTML = `
                <a href="archive.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回文章列表</a>
                <div class="article-meta">${article.date}</div>
                ${html}
            `;
            
            // 应用代码语法高亮
            setTimeout(highlightCode, 100);
        } else {
            const articleContent = document.getElementById('article-content');
            articleContent.innerHTML = `
                <a href="archive.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回文章列表</a>
                <div class="article-meta">${new Date().toLocaleDateString()}</div>
                <h2>文章加载失败</h2>
                <p>找不到指定的文章。</p>
            `;
        }
    }

    function randomJump() {
        const urls = [
            'https://www.google.com',
            'https://github.com',
            'https://stackoverflow.com',
            'https://www.wikipedia.org',
            'https://www.reddit.com',
            'https://news.ycombinator.com',
            'https://www.youtube.com',
            'https://www.netflix.com',
            'https://www.spotify.com',
            'https://www.medium.com'
        ];
        const randomUrl = urls[Math.floor(Math.random() * urls.length)];
        window.open(randomUrl, '_blank');
    }

    // 汉堡菜单功能
    const menuToggle = document.getElementById('menuToggle');
    const nav = document.getElementById('main-nav');
    
    menuToggle.addEventListener('click', function() {
        nav.classList.toggle('active');
        // 切换菜单图标
        const icon = menuToggle.querySelector('i');
        if (nav.classList.contains('active')) {
            icon.classList.remove('fa-bars');
            icon.classList.add('fa-times');
        } else {
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
        }
    });

    // 点击导航链接后关闭菜单
    const navLinks = nav.querySelectorAll('a');
    navLinks.forEach(link => {
        link.addEventListener('click', function() {
            nav.classList.remove('active');
            const icon = menuToggle.querySelector('i');
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
        });
    });

    window.addEventListener('scroll', function() {
        const currentScrollY = window.scrollY;
        if (currentScrollY > lastScrollY && currentScrollY > 100) {
            nav.style.transform = 'translateY(-100%)';
        } else {
            nav.style.transform = 'translateY(0)';
        }
        lastScrollY = currentScrollY;
    });

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    // 回到顶部功能
    const backToTopBtn = document.getElementById('backToTop');

    window.addEventListener('scroll', function() {
        if (window.pageYOffset > 300) {
            backToTopBtn.classList.add('show');
        } else {
            backToTopBtn.classList.remove('show');
        }
    });

    backToTopBtn.addEventListener('click', function() {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    });
</script>
</body>
</html>
