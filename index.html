<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi, I'm Conny</title>
    <link rel="icon" href="pic1.png" type="image/png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <script src="articles.js"></script>
    <!-- 预加载个人形象图 -->
    <link rel="preload" as="image" href="pic0.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            background: transparent;
        }
        
        body {
            min-height: 100vh;
            background: #000;
            overflow-x: hidden;
            font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
            scroll-behavior: smooth;
            padding-top: 80px; /* 给导航栏预留空间 */
            display: flex;
            flex-direction: column;
        }
        
        .main-content {
            flex: 1;
        }
        
        /* 星空保留fixed作为全局背景 */
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease-out, transform 1s ease-out;
        }

        /* 导航栏：始终固定在顶部，永不隐藏 */
        #main-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 999; /* 最高层级，确保不被遮挡 */
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 15px 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            opacity: 0;
            /* 移除 translateY，避免滚动时位移 */
            transform: translateY(0);
            transition: opacity 0.5s ease, transform 0.3s ease; /* 添加过渡动画 */
        }
        
        /* 汉堡菜单按钮 */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            border: none;
            color: #d87999;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
        }

        #main-nav a {
            color: #d87999;
            font-size: 18px;
            text-decoration: none;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

#main-nav a img {
    width: 18px;
    height: 18px;
    object-fit: contain;
    /* 直接匹配 #d87999 的粉色（RGB：216, 121, 153） */
    filter: brightness(0) saturate(100%) 
            invert(62%) sepia(17%) saturate(1162%) hue-rotate(314deg) brightness(90%) contrast(89%);
}

#main-nav a:hover img {
    /* 匹配 hover 色 #ae8d8d（RGB：174, 141, 141） */
    filter: brightness(0) saturate(100%) 
            invert(70%) sepia(8%) saturate(537%) hue-rotate(314deg) brightness(100%) contrast(85%);
}

        #main-nav a:hover {
            color: #ae8d8d;
        }

        /* 首屏容器：独立参考系，确保内部元素定位稳定 */
        .hero-section {
            position: relative;
            width: 100%;
            height: calc(100vh - 80px); /* 减去导航栏高度 */
            z-index: 4;
        }

        /* 打字机容器：核心修改 - left从12%改为15%（往中间靠一点点） */
        .hero-text-container {
            position: absolute; 
            top: 40%; 
            left: 15%; /* 关键修改：从12%→15%，靠中间一点点 */
            transform: translateY(-50%);
            font-family: "SimSun", "宋体", serif;
            font-weight: 700;
            color: #fff;
            line-height: 1.5;
            white-space: nowrap;
            transition: opacity 0.5s ease;
        }

        .typewriter-line1 {
            font-size: 3.5vw;
        }
        .typewriter-line2,
        .typewriter-line3 {
            font-size: 4.8vw;
        }

        .typewriter-text.cursor::after {
            content: "|";
            display: inline-block;
            margin-left: 8px;
            color: #fff;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%,100%{opacity:1;}50%{opacity:0;}
        }

        /* 社交图标：核心修改 - top从150px改为180px（往下移动30px） */
        .social-icons {
            position: absolute; 
            top: calc(40% + 180px); /* 关键修改：从150px→180px，往下移动30px */
            left: 15%; /* 和打字机同步靠中间 */
            z-index: 20;
            display: flex;
            gap: clamp(20px, 2vw, 30px);
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .social-icons a {
            color: #d87999;
            font-size: clamp(24px, 3vw, 32px);
            transition: all 0.3s ease;
        }

        .social-icons a:hover {
            color: #ae8d8d;
            transform: translateY(-3px);
        }

        /* 图片：核心修改 - right从10%改为12%（往中间靠一点点） */
        #right-center-image {
            position: absolute; 
            top: 45%; 
            right: 12%; /* 关键修改：从10%→12%，靠中间一点点 */
            transform: translateY(-50%); 
            z-index: 5;
            max-width: 400px;
            width: 30vw;
            min-width: 150px;
            height: auto;
            opacity: 0;
            border-radius: 100px !important;
            transition: opacity 1s ease-out 0.4s, transform 1s ease-out 0.4s;
            pointer-events: none;
            /* 优化图片加载：使用渐进式渲染 */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            /* 先显示模糊占位，加载完成后变清晰 */
            filter: blur(0px);
            will-change: opacity;
        }
        
        /* 图片加载中的模糊效果 */
        #right-center-image.loading {
            filter: blur(10px);
            opacity: 0.5;
        }

        .scroll-tip {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            color: #fff;
            font-size: 30px;
            opacity: 0;
            transition: opacity 1s ease-out 0.6s, transform 1s ease-out 0.6s;
            animation: arrowBounce 1.5s infinite ease-in-out;
        }

        @keyframes arrowBounce {
            0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(8px);}
        }

        /* 时间轴：relative + 正常文档流 */
        .timeline-section {
            position: relative;
            min-height: 80vh;
            padding: 80px 0;
            z-index: 5;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .timeline-section.show {
            opacity: 1;
            transform: translateY(0);
        }

        .timeline {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: #d87999;
        }

        .timeline-item {
            margin-bottom: 40px;
            position: relative;
            width: 50%;
            box-sizing: border-box;
        }

        .timeline-item:nth-child(odd) {
            padding-right: 60px;
            text-align: right;
        }

        .timeline-item:nth-child(even) {
            padding-left: 60px;
            margin-left: 50%;
        }

        .timeline-dot {
            position: absolute;
            top: 0;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #d87999;
            border: 4px solid #000;
            z-index: 10;
        }

        .timeline-item:nth-child(odd) .timeline-dot {
            right: -10px;
        }

        .timeline-item:nth-child(even) .timeline-dot {
            left: -10px;
        }

        .timeline-content {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 12px;
            color: #fff;
            backdrop-filter: blur(5px);
        }

        .timeline-date {
            font-size: 14px;
            color: #d87999;
            margin-bottom: 10px;
        }

        .timeline-title {
            font-size: 24px;
            margin-bottom: 15px;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .timeline-title a {
            color: #d87999;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .timeline-title a:hover {
            color: #ae8d8d;
        }

        .timeline-desc {
            font-size: 16px;
            line-height: 1.6;
            color: #ccc;
        }

        @media (max-width:768px){
            /* 导航栏适配 */
            #main-nav {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: auto;
                flex-direction: row;
                align-items: center;
                justify-content: center;
                gap: 15px;
                background: rgba(0,0,0,0.95);
                padding: 10px 0;
                transform: translateY(0);
                transition: transform 0.3s ease;
                z-index: 1000;
            }
            
            /* 手机端导航栏只显示文字，不显示图标 */
            #main-nav a img {
                display: none;
            }
            
            #main-nav a {
                font-size: 16px;
                padding: 5px 10px;
                color: #d87999;
            }
            
            /* 时间轴适配 */
            .timeline::before{left:20px;}
            .timeline-item{width:100%;padding-left:60px !important;margin-left:0 !important;text-align:left !important;}
            .timeline-item .timeline-dot{left:-10px !important;}
            
            /* 首屏适配 */
            /* 垂直排列形象图、打字机和社交图标并居中 */
            #right-center-image {
                position: absolute !important;
                width: 180px !important;
                right: auto !important;
                left: 50% !important;
                top: 20% !important;
                transform: translateX(-50%) !important;
                margin: 0 auto !important;
                display: block !important;
                z-index: 10 !important;
            }
            
            .hero-text-container {
                position: absolute !important;
                left: 50% !important;
                top: 50% !important;
                transform: translateX(-50%) !important;
                text-align: center !important;
                margin: 0 auto !important;
                display: block !important;
                z-index: 10 !important;
            }
            
            .social-icons {
                position: absolute !important;
                left: 50% !important;
                top: 70% !important;
                transform: translateX(-50%) !important;
                margin: 0 auto !important;
                justify-content: center !important;
                display: flex !important;
                z-index: 10 !important;
            }
            
            .typewriter-line1 {font-size: 5vw;}
            .typewriter-line2, .typewriter-line3 {font-size: 6vw;}
            
            /* 手机端时间区域字体调整 */
            #current-time .time-label {
                font-size: 5vw !important;
                margin-bottom: 10px !important;
            }
            
            #current-time .time-value {
                font-size: 4vw !important;
            }
            
            #day-progress .progress-label {
                font-size: 4vw !important;
                margin-bottom: 5px !important;
            }
            
            #day-progress .progress-value {
                font-size: 4vw !important;
            }
            
            #day-progress .progress-warning {
                font-size: 4vw !important;
                margin-top: 5px !important;
            }
        }

        /* 动画完成样式 */
        body.animate-complete #stars {opacity:1;transform:translateY(0);}
        body.animate-complete #main-nav {opacity:1;}
        body.animate-complete #right-center-image {opacity:1;}
        body.animate-complete .social-icons {opacity:1;transform: translateY(0);}
        body.animate-complete .scroll-tip {opacity:1;transform:translateX(-50%) translateY(0);}

        /* 当前时间区域 */
        .time-section {
            position: relative;
            min-height: 20vh;
            display: flex;
            flex-direction: column; /* 垂直排列内部项 */
            justify-content: center;
            align-items: center;
            margin-top: 250px; /* 时间轴与当前时间间隔 */
            margin-bottom: 150px;
            z-index: 5;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .time-section.show {
            opacity: 1;
            transform: translateY(0);
        }

        #current-time {
            text-align: center;
            color: #fff;
            font-family: 'Arial', sans-serif;
            margin-bottom: 150px; /* 与上方时间轴保持距离 */
        }

        #current-time .time-label {
            font-size: 36px;
            margin-bottom: 20px;
        }

        #current-time .time-value {
            font-size: 24px;
        }

        #day-progress {
            text-align: center;
            color: #fff;
            font-family: 'Arial', sans-serif;
            margin-top: 20px; /* 与时间分开一些 */
        }
        #day-progress .progress-label {
            font-size: 24px; /* 与上方时间值同大 */
            margin-bottom: 5px;
        }
        #day-progress .progress-value {
            font-size: 24px; /* 同上 */
        }
        #day-progress .progress-warning {
            font-size: 28px; /* 稍大一些但不过分 */
            margin-top: 15px;
        }

        /* 导航选项区域 */
        .navigation-section {
            position: relative;
            width: 100%;
            padding: 100px 20px;
            text-align: center;
            color: #fff;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            z-index: 5;
        }
        .navigation-section.show {
            opacity: 1;
            transform: translateY(0);
        }
        .nav-options {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .nav-link {
            color: #d87999;
            font-size: 18px;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .nav-link:hover {
            color: #ae8d8d;
        }

        .nav-text {
            color: #d87999;
            font-size: 18px;
        }

        /* ========== 修改：评论区样式（替代原封笔区域） ========== */
        .comment-section {
            position: relative;
            width: 100%;
            padding: 80px 20px;
            text-align: center;
            color: #fff;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            z-index: 5;
        }
        .comment-section.show {
            opacity: 1;
            transform: translateY(0);
        }
        /* 说说标题 + 分割线 */
        .comment-title {
            font-size: 32px;
            color: #d87999;
            margin-bottom: 15px;
            font-weight: normal;
        }
        .comment-divider {
            width: 80px;
            height: 2px;
            background: #d87999;
            margin: 0 auto 40px;
            border-radius: 1px;
        }
        /* 评论输入区域 */
        .comment-input-wrap {
            max-width: 800px;
            margin: 0 auto 60px;
            padding: 0 20px;
        }
        #comment-textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(216, 121, 153, 0.2) !important;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            resize: vertical;
            font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
            transition: border-color 0.3s ease;
        }
        #comment-textarea:focus {
            border-color: rgba(216, 121, 153, 0.5) !important;
            outline: none;
        }
        #comment-textarea::placeholder {
            color: #888;
        }
        .comment-submit-btn {
            margin-top: 15px;
            padding: 10px 30px;
            background: rgba(216, 121, 153, 0.2);
            color: #d87999;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            float: right;
        }
        .comment-submit-btn:hover {
            background: rgba(216, 121, 153, 0.4);
            color: #fff;
        }
        /* 评论列表 */
        .comment-list {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
            text-align: left;
        }
        .comment-item {
            padding: 20px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 3px solid #d87999 !important;
        }
        .comment-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .comment-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(216, 121, 153, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d87999;
            font-size: 18px;
            margin-right: 12px;
        }
        .comment-author {
            font-size: 16px;
            color: #d87999;
            font-weight: 500;
        }
        .comment-time {
            font-size: 12px;
            color: #888;
            margin-left: 15px;
        }
        .comment-content {
            font-size: 15px;
            color: #eee;
            line-height: 1.6;
        }
        /* 移动端评论区适配 */
        @media (max-width:768px) {
            .comment-title {
                font-size: 26px;
            }
            #comment-textarea {
                min-height: 100px;
                font-size: 15px;
            }
            .comment-submit-btn {
                width: 100%;
                float: none;
            }
            .comment-item {
                padding: 15px;
            }
            .comment-avatar {
                width: 35px;
                height: 35px;
                font-size: 16px;
            }
        }

        /* ========== 底部版权区域样式 ========== */
        footer {
            position: relative;
            width: 100%;
            padding: 40px 20px 20px;
            margin-top: 200px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: #ccc;
            text-align: center;
            z-index: 5;
            opacity: 1 !important; /* 底部始终可见，覆盖之前的动画隐藏 */

            transform: translateY(0)!important;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        footer.show {
            opacity: 1;
            transform: translateY(0);
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            font-size: 14px;
            line-height: 1.8;
        }
        .copyright {
            margin-bottom: 8px;
        }
        .power-by {
            color: #d87999;
            margin-bottom: 12px;
        }
        .footer-link {
            color: #d87999;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .footer-link:hover {
            color: #ccc;
        }
        .beian-info {
            font-size: 12px;
            color: #888;
        }
        /* 移动端底部样式适配 */
        @media (max-width:768px) {
            footer {
                padding: 30px 15px 15px;
            }
            .footer-content {
                font-size: 13px;
            }
            .beian-info {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <canvas id="stars"></canvas>
    
    <!-- 导航栏：始终在顶部 -->
    <nav id="main-nav">
        <a href="index.html"><img src="icons/home.png" alt="">首页</a>
        <a href="archive.html"><img src="icons/archive.png" alt="">归档</a>
        <a href="note.html"><img src="icons/note.png" alt="">手记</a>
        <a href="link.html"><img src="icons/link.png" alt="">友链</a>
        <a href="#" onclick="randomJump(); return false;"><img src="icons/jump.png" alt="">跃迁</a>
    </nav>

    <div class="main-content">
        <!-- 首屏：relative区域 -->
        <section class="hero-section">
            <!-- 打字机容器：独立绝对定位 -->
            <div class="hero-text-container">
                <div class="hero-text">
                    <div class="typewriter-line1 typewriter-text"></div>
                    <div class="typewriter-line2 typewriter-text"></div>
                    <div class="typewriter-line3 typewriter-text"></div>
                </div>
            </div>

            <div class="social-icons">
                <a href="#" onclick="showComingSoon(); return false;"><i class="fa-brands fa-weibo"></i></a>
                <a href="https://space.bilibili.com/1446360961?spm_id_from=333.1007.0.0" target="_blank"><i class="fa-brands fa-bilibili"></i></a>
                <a href="https://github.com/Chuangjie-Yang" target="_blank"><i class="fa-brands fa-github"></i></a>
                <a href="#" onclick="showComingSoon(); return false;"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" onclick="showComingSoon(); return false;"><i class="fa-brands fa-telegram"></i></a>
            </div>

            <img id="right-center-image" src="pic0.png" alt="个人形象图" class="loading" onload="this.classList.remove('loading')">
            <div class="scroll-tip">
                <i class="fas fa-chevron-down"></i>
            </div>
        </section>

        <!-- 时间轴：relative -->
        <section class="timeline-section">
            <div class="timeline" id="article-timeline"></div>
        </section>

        <!-- 当前时间 -->
        <section class="time-section">
            <div id="current-time"></div>
            <div id="day-progress"></div>
        </section>

        <!-- 导航选项 -->
        <section class="navigation-section">
            <div class="nav-options">
                <span class="nav-text">风向标</span>
                <a href="#" class="nav-link" onclick="randomJump(); return false;">去别处看看</a>
            </div>
        </section>

        <!-- ========== 修改：评论区（替代原封笔区域） ========== -->
        <section class="comment-section">
            <!-- 说说标题 + 分割线 -->
            <h2 class="comment-title">说说</h2>
            <div class="comment-divider"></div>

            <!-- 评论输入区域 -->
            <div class="comment-input-wrap">
                <textarea id="comment-textarea" placeholder="分享你的想法..."></textarea>
                <button class="comment-submit-btn" onclick="submitComment()">发布评论</button>
            </div>

            <!-- 评论列表 -->
            <div class="comment-list" id="comment-list">
                <!-- 示例评论1 -->
                <div class="comment-item">
                    <div class="comment-header">
                        <div class="comment-avatar">C</div>
                        <div class="comment-author">Conny</div>
                        <div class="comment-time">2026-03-11 10:00</div>
                    </div>
                    <div class="comment-content">
                        欢迎来到我的博客～ 记录生活，分享技术，一起成长✨
                    </div>
                </div>
                <!-- 示例评论2 -->
                <div class="comment-item">
                    <div class="comment-header">
                        <div class="comment-avatar">Y</div>
                        <div class="comment-author">Yang</div>
                        <div class="comment-time">2026-03-11 11:20</div>
                    </div>
                    <div class="comment-content">
                        这个星空背景太好看了！代码写得也很棒，学习了👍
                    </div>
                </div>
            </div>
        </section>

        <!-- 回到顶部按钮 -->
        <div class="back-to-top" id="backToTop">↑</div>
    </div>

    <!-- 底部版权区域 -->
    <footer>
        <div class="footer-content">
            <div class="copyright">Copyright © 2026 Conny's Blog. All Rights Reserved.</div>
            <div class="power-by">Power by <a href="#" class="footer-link">Conny Jabrado</a> | Designed with Chuangjie Yang</div>
            <div class="beian-info">萌ICP备20240924号 | 网站安全检测 ✔</div>
        </div>
    </footer>

<script>
    let isAnimateComplete = false;
    let lastScrollPosition = 0;
    let navBar = document.getElementById('main-nav');
    let navHeight = navBar.offsetHeight;

    // 强制刷新回到顶部
    window.history.scrollRestoration = "manual";
    window.scrollTo(0, 0);

    function getChars(text) {
        return [...new Intl.Segmenter().segment(text)].map(s => s.segment);
    }

    function typeWriterEffect(element, text, speed = 150, delay = 0, lastLine = false) {
        const chars = getChars(text);
        let index = 0;
        element.innerHTML = '';
        
        setTimeout(() => {
            element.classList.add('cursor');
            const typing = () => {
                if (index < chars.length) {
                    element.innerHTML += chars[index];
                    index++;
                    setTimeout(typing, speed);
                } else {
                    if (lastLine) {
                        setTimeout(() => {
                            element.classList.remove('cursor');
                            document.querySelector('.social-icons').style.opacity = 1;
                            document.querySelector('.social-icons').style.transform = 'translateY(0)';
                        }, 1200);
                    } else {
                        element.classList.remove('cursor');
                    }
                }
            };
            typing();
        }, delay);
    }

    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            document.body.classList.add('animate-complete');
            isAnimateComplete = true;

            const line1 = document.querySelector('.typewriter-line1');
            const line2 = document.querySelector('.typewriter-line2');
            const line3 = document.querySelector('.typewriter-line3');

            const text1 = 'Hi,I am Conny🖐️';
            const text2 = '「俱怀逸兴壮思飞,';
            const text3 = ' 欲上青天揽明月」';

            typeWriterEffect(line1, text1, 160, 0, false);
            typeWriterEffect(line2, text2, 180, text1.length * 160 + 400, false);
            typeWriterEffect(line3, text3, 180, text1.length * 160 + text2.length * 180 + 800, true);

            setTimeout(() => {
                lastScrollPosition = window.scrollY;
                checkAllShow();
                // 添加滚动事件监听
                window.addEventListener('scroll', handleScroll);
            }, 1500);
        }, 100);
    });

    // 处理滚动事件，实现导航栏下滑隐藏，上滑显示
    function handleScroll() {
        if (!isAnimateComplete) return;
        
        const currentScrollPosition = window.scrollY;
        
        // 只有当滚动距离超过导航栏高度时才触发隐藏/显示逻辑
        if (Math.abs(currentScrollPosition - lastScrollPosition) > 10) {
            if (currentScrollPosition > lastScrollPosition && currentScrollPosition > navHeight) {
                // 下滑，隐藏导航栏
                navBar.style.transform = `translateY(-${navHeight + 10}px)`;
            } else {
                // 上滑，显示导航栏
                navBar.style.transform = 'translateY(0)';
            }
            lastScrollPosition = currentScrollPosition;
        }
    }

    // 星空画布逻辑
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    class Star {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() *1.5 + 0.2;
            this.alpha = Math.random() * 0.1 + 0.9;
            this.moveX = (Math.random() - 0.5) * 0.4;
            this.moveY = (Math.random() - 0.5) * 0.4;
        }
        update() {
            this.x += this.moveX;
            this.y += this.moveY;
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
            ctx.fill();
        }
    }

    const stars = Array.from({length:300},()=>new Star());
    function animateStars() {
        ctx.fillStyle = 'rgba(0,0,0,1)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        stars.forEach(s=>{s.update();s.draw();});
        requestAnimationFrame(animateStars);
    }
    animateStars();

    // 随机跳转函数
    function randomJump() {
        const urls = [
            'https://www.google.com',
            'https://github.com',
            'https://stackoverflow.com',
            'https://www.wikipedia.org',
            'https://www.reddit.com',
            'https://news.ycombinator.com',
            'https://www.youtube.com',
            'https://www.netflix.com',
            'https://www.spotify.com',
            'https://www.medium.com'
        ];
        const randomUrl = urls[Math.floor(Math.random() * urls.length)];
        window.open(randomUrl, '_blank');
    }

    // 暂未开放提示
    function showComingSoon() {
        alert('暂未开放，敬请期待！');
    }



    // 元素获取
    const heroSection = document.querySelector('.hero-section');
    const timelineSection = document.querySelector('.timeline-section');
    const navigationSection = document.querySelector('.navigation-section');
    const timeSection = document.querySelector('.time-section');
    // ========== 修改：替换为评论区元素 ==========
    const commentSection = document.querySelector('.comment-section');
    const footer = document.querySelector('footer');
    let FADE_RANGE = window.innerHeight * 0.8;
    let lastScrollY = 0; // 添加滚动方向检测变量

    // 显示检测
    function checkAllShow() {
        const windowHeight = window.innerHeight;
        const scrollTop = window.scrollY;
        const timelineTop = timelineSection.offsetTop;
        const navigationTop = navigationSection.offsetTop;
        const timeTop = timeSection.offsetTop;
        // ========== 修改：评论区top值 ==========
        const commentTop = commentSection.offsetTop;
        const footerTop = footer.offsetTop;

        // 时间轴显示
        const showTriggerTimeline = timelineTop - windowHeight * 0.8;
        if (scrollTop >= showTriggerTimeline) {
            timelineSection.classList.add('show');
        } else {
            timelineSection.classList.remove('show');
        }

        // 导航选项显示
        const showTriggerNavigation = navigationTop - windowHeight * 0.8;
        if (scrollTop >= showTriggerNavigation) {
            navigationSection.classList.add('show');
        } else {
            navigationSection.classList.remove('show');
        }

        // 当前时间显示
        const showTriggerTime = timeTop - windowHeight * 0.8;
        if (scrollTop >= showTriggerTime) {
            timeSection.classList.add('show');
        } else {
            timeSection.classList.remove('show');
        }

        // ========== 修改：评论区显示逻辑 ==========
        const showTriggerComment = commentTop - windowHeight * 0.8;
        if (scrollTop >= showTriggerComment) {
            commentSection.classList.add('show');
        } else {
            commentSection.classList.remove('show');
        }

        // footer显示逻辑
        const showTriggerFooter = footerTop - windowHeight * 0.8;
        if (scrollTop >= showTriggerFooter) {
            footer.classList.add('show');
        } else {
            footer.classList.remove('show');
        }
    }

    // 滚动事件：添加导航栏隐藏/显示逻辑
    window.addEventListener('scroll', function() {
        checkAllShow();
        if (!isAnimateComplete) return;

        const currentScrollY = window.scrollY;
        
        // 导航栏滚动方向检测：下滑隐藏，上滑显示
        if (currentScrollY > lastScrollY && currentScrollY > 100) {
            // 向下滚动且超过100px，隐藏导航栏
            nav.style.transform = 'translateY(-100%)';
        } else {
            // 向上滚动或在顶部，显示导航栏
            nav.style.transform = 'translateY(0)';
        }
        lastScrollY = currentScrollY;

        // 首屏淡出逻辑
        let opacityValue = 1 - (currentScrollY / FADE_RANGE);
        opacityValue = Math.max(0, Math.min(1, opacityValue));
        heroSection.style.opacity = opacityValue;

        lastScrollPosition = currentScrollY;
    });

    // 窗口大小变化
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        FADE_RANGE = window.innerHeight * 0.8;
        checkAllShow();
    });
    
    // 生成文章时间轴
    generateArticleTimeline();
    
    checkAllShow();

    // 更新当前时间
    function updateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const milliseconds = String(now.getMilliseconds()).padStart(3, '0');
        const timeString = `${year}年${month}月${day}日${hours}时${minutes}分${seconds}秒${milliseconds}`;

        // 计算今天已过百分比
        const totalMs = 24 * 60 * 60 * 1000;
        const passedMs = hours * 3600000 + minutes * 60000 + seconds * 1000 + now.getMilliseconds();
        const percent = (passedMs / totalMs * 100).toFixed(2);

        document.getElementById('current-time').innerHTML = `
            <div class="time-label">现在是</div>
            <div class="time-value">${timeString}</div>
        `;
        document.getElementById('day-progress').innerHTML = `
            <div class="progress-label">今天已过</div>
            <div class="progress-value">${percent}%</div>
            <div class="progress-warning">望惜时</div>
        `;
    }

    // 每100毫秒更新一次时间
    setInterval(updateTime, 100);
    updateTime(); // 立即更新一次

    // ========== 新增：评论提交功能 ==========
    function submitComment() {
        const textarea = document.getElementById('comment-textarea');
        const commentContent = textarea.value.trim();
        
        // 空评论不提交
        if (!commentContent) {
            alert('请输入评论内容～');
            return;
        }

        // 获取当前时间
        const now = new Date();
        const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        
        // 创建评论元素
        const commentItem = document.createElement('div');
        commentItem.className = 'comment-item';
        // 随机头像首字母（示例用"U"代表User）
        commentItem.innerHTML = `
            <div class="comment-header">
                <div class="comment-avatar">U</div>
                <div class="comment-author">访客</div>
                <div class="comment-time">${timeStr}</div>
            </div>
            <div class="comment-content">
                ${commentContent}
            </div>
        `;

        // 添加到评论列表顶部
        const commentList = document.getElementById('comment-list');
        commentList.insertBefore(commentItem, commentList.firstChild);

        // 清空输入框
        textarea.value = '';

        // 提示成功
        alert('评论发布成功～');
    }

    // 生成文章时间轴
    function generateArticleTimeline() {
        // 过滤掉友链文件，只显示归档文件和手记文件
        const filteredArticles = articles.filter(article => article.category !== 'link');
        
        // 按日期排序，最新的文章排在前面
        const sortedArticles = [...filteredArticles].sort((a, b) => new Date(b.date) - new Date(a.date));
        
        // 取前6篇文章
        const recentArticles = sortedArticles.slice(0, 6);
        
        const timelineContainer = document.getElementById('article-timeline');
        timelineContainer.innerHTML = '';
        
        recentArticles.forEach((article, index) => {
            const timelineItem = document.createElement('div');
            timelineItem.className = 'timeline-item';
            
            // 格式化日期为 YYYY.MM 格式
            const dateParts = article.date.split('-');
            const formattedDate = `${dateParts[0]}.${dateParts[1]}`;
            
            timelineItem.innerHTML = `
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <div class="timeline-date">${formattedDate}</div>
                    <h3 class="timeline-title"><a href="article.html?id=${article.id}">${article.title}</a></h3>
                    <p class="timeline-desc">${article.desc}</p>
                </div>
            `;
            
            timelineContainer.appendChild(timelineItem);
        });
    }

    // 回到顶部功能
    const backToTopBtn = document.getElementById('backToTop');

    window.addEventListener('scroll', function() {
        if (window.pageYOffset > 300) {
            backToTopBtn.classList.add('show');
        } else {
            backToTopBtn.classList.remove('show');
        }
    });

    backToTopBtn.addEventListener('click', function() {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    });
</script>
</body>
